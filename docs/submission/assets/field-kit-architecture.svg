  <text x="128" y="512" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0369a1">dates, docs, contacts</text>

  <rect x="392" y="408" width="246" height="128" rx="8" fill="#ffffff" stroke="#bae6fd" stroke-width="2"/>
